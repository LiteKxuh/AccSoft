<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1c1917" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>HotelOps · Premium Hotel Accounting & Operations</title>
    <meta name="description" content="HotelOps — daily accounting, night-audit ingestion, payroll, and workforce operations for multi-property hotels." />
  </head>
  <body class="font-body bg-stone-50">
    <div id="root"></div>
    <script>
      // Last-resort error overlay — paints any uncaught error/rejection
      // directly into the DOM so a blank renderer is never silent.
      (function () {
        function paint(title, detail) {
          var el = document.getElementById("root") || document.body;
          el.innerHTML =
            '<div style="font:14px/1.5 system-ui,sans-serif;color:#fff;background:#7f1d1d;padding:24px;height:100vh;overflow:auto;white-space:pre-wrap;">' +
            '<div style="font-size:18px;font-weight:600;margin-bottom:12px;">HotelOps · startup error</div>' +
            '<div style="font-weight:600;margin-bottom:8px;">' + title + '</div>' +
            '<div style="font-family:ui-monospace,Consolas,monospace;font-size:12px;background:#450a0a;padding:12px;border-radius:6px;">' +
            (detail || '') + '</div></div>';
        }
        window.addEventListener("error", function (e) {
          paint(e.message || "Uncaught error", (e.error && e.error.stack) || (e.filename + ":" + e.lineno));
        });
        window.addEventListener("unhandledrejection", function (e) {
          var r = e.reason;
          paint("Unhandled promise rejection", (r && r.stack) || String(r));
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register the service worker only in real PWA contexts. Electron uses
      // file:// where SWs aren't supported and would just throw.
      if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("./sw.js").catch(function () {});
        });
      }
    </script>
  </body>
</html>
